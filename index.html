<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TajKomp | Магазин электроники</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #007AFF; /* Современный синий */
            --primary-hover: #005BB5;
            --accent: #00D4FF; /* Бирюзовый для подсветки */
            --bg: #000B18; /* Глубокий темно-синий */
            --card: #00162D;
            --text: #ffffff;
            --input: #002347;
            --glow: 0 0 15px rgba(0, 122, 255, 0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="light"] {
            --bg: #F0F5FA; --card: #ffffff; --text: #00162D; --input: #E1E9F1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--bg); color: var(--text); transition: background var(--transition); overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

        /* ШАПКА */
        header { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); padding: 25px; text-align: center; color: white; box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
        #smart-search { width: 100%; max-width: 600px; padding: 14px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.15); color: white; outline: none; margin-top: 15px; backdrop-filter: blur(10px); transition: var(--transition); }
        #smart-search::placeholder { color: rgba(255,255,255,0.7); }
        #smart-search:focus { background: rgba(255,255,255,0.25); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        /* НАВИГАЦИЯ */
        nav { background: var(--card); padding: 12px; position: sticky; top: 0; z-index: 900; border-bottom: 1px solid rgba(0,122,255,0.2); backdrop-filter: blur(15px); }
        .nav-container { display: flex; overflow-x: auto; gap: 12px; max-width: 1300px; margin: 0 auto; scrollbar-width: none; }
        .nav-link { padding: 10px 22px; background: rgba(128,128,128,0.05); border-radius: 50px; cursor: pointer; font-size: 0.85rem; transition: var(--transition); white-space: nowrap; color: #8899A6; font-weight: 600; border: 1px solid transparent; }
        .nav-link:hover { color: var(--primary); background: rgba(0,122,255,0.05); }
        .nav-link.active { background: var(--primary); color: white; box-shadow: var(--glow); border-color: var(--accent); }
        
        .sub-nav { display: none; background: rgba(0,122,255,0.03); padding: 12px; justify-content: center; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid rgba(0,122,255,0.1); }
        .sub-link { padding: 8px 18px; background: rgba(128,128,128,0.08); border-radius: 50px; cursor: pointer; font-size: 0.75rem; color: #8899A6; transition: var(--transition); }
        .sub-link.active { background: var(--accent); color: #000; font-weight: bold; }

        /* СЕТКА ТОВАРОВ */
        .container { flex: 1; max-width: 1300px; margin: 25px auto; padding: 0 15px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        @media (max-width: 600px) { .products-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }

        /* КАРТОЧКА */
        .product-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid rgba(0,122,255,0.1); transition: var(--transition); position: relative; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .product-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 15px 40px rgba(0,122,255,0.3); }
        .p-img { width: 100%; aspect-ratio: 1/1; background-size: cover; background-position: center; background-color: #000b18; }
        
        .promo-badge { position: absolute; top: 12px; left: 12px; background: linear-gradient(45deg, #00F2FF, #007AFF); color: #000; padding: 5px 12px; border-radius: 50px; font-size: 0.65rem; font-weight: 800; z-index: 5; box-shadow: 0 4px 10px rgba(0,242,255,0.4); }
        
        .p-info { padding: 18px; flex-grow: 1; display: flex; flex-direction: column; }
        .p-info h3 { font-size: 0.9rem; height: 2.4em; overflow: hidden; margin-bottom: 10px; line-height: 1.3; font-weight: 700; color: var(--text); }
        .price-new { color: var(--accent); font-weight: 800; font-size: 1.2rem; text-shadow: 0 0 10px rgba(0,212,255,0.2); }
        .price-old { color: #5B7083; text-decoration: line-through; font-size: 0.85rem; margin-left: 8px; }

        /* КНОПКИ */
        .btn-buy { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: var(--transition); margin-top: auto; }
        .btn-buy:hover { transform: scale(1.03); box-shadow: 0 5px 20px rgba(0,122,255,0.5); }
        .btn-buy:active { transform: scale(0.97); }

        /* МОДАЛЬНЫЕ ОКНА */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,11,24,0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 5000; padding: 20px; }
        .modal-content { background: var(--card); padding: 35px; border-radius: 30px; width: 100%; max-width: 550px; position: relative; max-height: 90vh; overflow-y: auto; text-align: center; border: 1px solid rgba(0,122,255,0.3); }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer; color: #5B7083; transition: var(--transition); }
        .close-btn:hover { color: var(--primary); transform: rotate(90deg); }

        /* АДМИН ПАНЕЛЬ */
        .add-p-btn { position: fixed; bottom: 35px; right: 35px; width: 65px; height: 65px; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border-radius: 20px; display: none; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; box-shadow: 0 10px 25px rgba(0,122,255,0.5); z-index: 3000; border: none; transition: var(--transition); }
        .add-p-btn:hover { transform: rotate(90deg) scale(1.1); }
        .admin-controls { position: absolute; top: 10px; right: 10px; display: none; gap: 8px; z-index: 20; }
        .admin-btn-card { width: 35px; height: 35px; border-radius: 12px; border: none; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }

        .admin-input { width: 100%; padding: 14px; background: var(--input); border: 1px solid rgba(0,122,255,0.2); color: var(--text); border-radius: 15px; margin-bottom: 15px; outline: none; transition: var(--transition); }
        .admin-input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,122,255,0.2); }

        /* ФУТЕР */
        footer { background: var(--card); padding: 50px 20px; border-top: 1px solid rgba(0,122,255,0.1); margin-top: 60px; text-align: center; }
        .social-item { text-decoration: none; color: white; padding: 12px 25px; border-radius: 50px; font-weight: bold; display: flex; align-items: center; gap: 10px; transition: var(--transition); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .social-item:hover { background: rgba(0,122,255,0.1); border-color: var(--primary); transform: translateY(-3px); }

        .cart-btn { position: fixed; top: 20px; right: 20px; background: white; color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 800; cursor: pointer; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: none; transition: var(--transition); }
        .cart-btn:hover { transform: scale(1.05); }

        #cart-sidebar { position: fixed; top: 0; right: -420px; width: 400px; height: 100%; background: var(--card); z-index: 4000; padding: 40px 30px; transition: var(--transition); border-left: 1px solid rgba(0,122,255,0.2); box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        @media (max-width: 450px) { #cart-sidebar { width: 100%; right: -100%; } }
        #cart-sidebar.active { right: 0; }
    </style>
</head>
<body>

<button class="theme-toggle" style="position:fixed; bottom:35px; left:35px; width:50px; height:50px; border-radius:15px; background:var(--card); border:1px solid var(--primary); color:var(--primary); cursor:pointer; z-index:2000;" onclick="toggleTheme()"><i class="fas fa-sun"></i></button>
<button class="admin-trigger" style="position:fixed; bottom:35px; left:100px; opacity:0.3; background:none; border:none; color:var(--text); font-size:24px; cursor:pointer; z-index:1000;" onclick="handleAdmin()"><i class="fas fa-user-shield"></i></button>
<button id="add-p-btn" class="add-p-btn" onclick="openAdminModal()"><i class="fas fa-plus"></i></button>

<div class="cart-btn" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>

<header>
    <h1 style="letter-spacing: 2px; font-weight: 800;">TajKomp</h1>
    <input type="text" id="smart-search" placeholder="Поиск современной техники..." oninput="render()">
</header>

<nav><div class="nav-container" id="category-list"></div></nav>
<div id="pc-sub-nav" class="sub-nav"></div>

<div class="container">
    <div class="products-grid" id="main-grid"></div>
    <p id="loader" style="text-align: center; margin-top: 50px; opacity: 0.5;">Синхронизация с базой данных...</p>
</div>

<footer>
    <div class="footer-info">
        <h3 style="margin-bottom: 20px; font-weight: 700;">TajKomp | Душанбе</h3>
        <p style="opacity: 0.7; margin-bottom: 30px;">Рынок "Корвон", Технический сектор</p>
        <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
            <a href="https://wa.me/992978117811" class="social-item"><i class="fab fa-whatsapp" style="color:#25D366"></i> WhatsApp</a>
            <a href="https://t.me/TajKomp" class="social-item"><i class="fab fa-telegram" style="color:#0088cc"></i> Telegram</a>
            <div class="social-item"><i class="fas fa-phone"></i> +992 978 11 78 11</div>
            <div class="social-item"><i class="fas fa-phone"></i> +992 944 44 20 44</div>
        </div>
    </div>
</footer>

<div id="admin-overlay" class="overlay">
    <div class="modal-content" style="text-align: left;">
        <span class="close-btn" onclick="closeAdmin()">&times;</span>
        <h2 style="color:var(--primary); margin-bottom:25px; font-weight:800;">Новый товар</h2>
        <input type="hidden" id="edit-id">
        <input type="text" id="p-name" class="admin-input" placeholder="Название товара">
        
        <select id="p-cat" class="admin-input">
            <optgroup label="Основные категории">
                <option value="Ноутбуки">Ноутбуки</option>
                <option value="Принтеры">Принтеры</option>
                <option value="Телефон">Телефон</option>
                <option value="Монитор">Монитор</option>
                <option value="Наушник">Наушник</option>
                <option value="Wi-Fi Роутер">Wi-Fi Роутер</option>
                <option value="Повербанк">Повербанк</option>
                <option value="SSD и HDD">SSD и HDD</option>
                <option value="Аксессуары">Аксессуары</option>
                <option value="Клавиатура и Мышка">Клавиатура и Мышка</option>
                <option value="Моноблоки">Моноблоки</option>
                <option value="Сборка ПК">Сборка ПК</option>
            </optgroup>
            <optgroup label="Комплектующие ПК">
                <option value="Блок питания для ПК">Блок питания для ПК</option>
                <option value="Видеокарты">Видеокарты</option>
                <option value="Кулеры для ПК">Кулеры для ПК</option>
                <option value="Материнские платы">Материнские платы</option>
                <option value="Оперативная память для ПК">Оперативная память для ПК</option>
                <option value="Процессоры">Процессоры</option>
                <option value="Оперативная память для ноутбук">Оперативная память для ноутбук</option>
            </optgroup>
        </select>

        <div style="display:flex; gap:15px;">
            <input type="number" id="p-price" class="admin-input" placeholder="Цена (смн)">
            <input type="number" id="p-old-price" class="admin-input" placeholder="Старая цена">
        </div>
        <textarea id="p-desc" class="admin-input" placeholder="Характеристики (через Enter)" rows="4"></textarea>
        <input type="text" id="p-img" class="admin-input" placeholder="Ссылки на фото через запятую">
        <button class="btn-buy" onclick="saveProduct()">Опубликовать</button>
    </div>
</div>

<div id="product-overlay" class="overlay" onclick="if(event.target==this) this.style.display='none'">
    <div class="modal-content" style="text-align: left;">
        <span class="close-btn" onclick="document.getElementById('product-overlay').style.display='none'">&times;</span>
        <div id="m-gallery" style="display:flex; overflow-x:auto; gap:12px; margin-bottom:20px; scrollbar-width:none;"></div>
        <h2 id="m-title" style="color:var(--primary); margin-bottom:12px; font-weight:800;"></h2>
        <div style="margin-bottom:20px; background: rgba(0,122,255,0.05); padding: 10px; border-radius: 12px; display: inline-block;">
            <span id="m-price" class="price-new" style="font-size: 1.6rem;"></span>
            <span id="m-old-price" class="price-old"></span>
        </div>
        <p id="m-desc" style="white-space:pre-line; font-size:0.95rem; line-height:1.7; opacity:0.8; margin-bottom:25px; border-top:1px solid rgba(0,122,255,0.1); padding-top:20px;"></p>
        <button id="m-buy-btn" class="btn-buy">🛒 В корзину</button>
    </div>
</div>

<div id="order-overlay" class="overlay">
    <div class="modal-content" style="text-align: left;">
        <span class="close-btn" onclick="document.getElementById('order-overlay').style.display='none'">&times;</span>
        <h2 style="color:var(--primary); margin-bottom:25px; font-weight:800;">Оформление заказа</h2>
        <input type="text" id="o-name" class="admin-input" placeholder="Ваше имя">
        <input type="text" id="o-phone" class="admin-input" placeholder="Телефон">
        <select id="o-del" class="admin-input" onchange="document.getElementById('o-addr').style.display = (this.value==='Доставка'?'block':'none')">
            <option value="Самовывоз">Самовывоз (Рынок Корвон)</option>
            <option value="Доставка">Доставка по Душанбе</option>
        </select>
        <input type="text" id="o-addr" class="admin-input" placeholder="Куда доставить?" style="display:none;">
        <button class="btn-buy" onclick="sendOrder()">Заказать в Telegram</button>
    </div>
</div>

<div id="success-overlay" class="overlay">
    <div class="modal-content">
        <div style="font-size:5rem; color:var(--accent); margin-bottom:20px; filter: drop-shadow(0 0 10px rgba(0,212,255,0.5));"><i class="fas fa-check-circle"></i></div>
        <h2 style="margin-bottom:15px; font-weight:800;">Заказ принят!</h2>
        <p id="success-text" style="line-height:1.6; opacity:0.8;"></p>
        <button class="btn-buy" onclick="location.reload()" style="background:var(--accent); color:#000; margin-top:25px;">Закрыть</button>
    </div>
</div>

<div id="cart-sidebar">
    <span class="close-btn" onclick="toggleCart()">&times;</span>
    <h2 style="color:var(--primary); margin-bottom:30px; font-weight:800;">Корзина</h2>
    <div id="cart-items" style="flex:1; overflow-y:auto;"></div>
    <div style="border-top:1px solid rgba(0,122,255,0.1); padding-top:25px;">
        <h3 style="display:flex; justify-content:space-between; margin-bottom:20px;">Итого: <span><span id="cart-total">0</span> смн</span></h3>
        <button class="btn-buy" onclick="openOrderForm()">Оформить сейчас</button>
    </div>
</div>

<script>
    // --- FIREBASE КОНФИГУРАЦИЯ ---
    const firebaseConfig = {
        databaseURL: "https://tajkomp-7a3fa-default-rtdb.firebaseio.com/" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const botToken = '8681756976:AAHIRkRSGduktZCfUeChoABowJ6VH8cwVlg';
    const chatId = '8506743201';

    let products = [];
    let categories = ["Ноутбуки", "Принтеры", "Телефон", "Монитор", "Наушник", "Wi-Fi Роутер", "Повербанк", "SSD и HDD", "Аксессуары", "Клавиатура и Мышка", "Моноблоки", "Сборка ПК"];
    let subCats = ["Блок питания для ПК", "Видеокарты", "Кулеры для ПК", "Материнские платы", "Оперативная память для ПК", "Процессоры", "Оперативная память для ноутбук"];

    let cart = [];
    let currentCat = "Все";
    let currentSub = "Все";
    let isAdmin = false;

    // ЗАГРУЗКА
    db.ref('products').on('value', (snapshot) => {
        const data = snapshot.val();
        products = data ? Object.values(data) : [];
        document.getElementById('loader').style.display = 'none';
        render();
    });

    // АДМИН
    function handleAdmin() {
        if (!isAdmin && prompt("Пароль доступа:") === "idiev050905") {
            isAdmin = true;
            document.getElementById('add-p-btn').style.display = 'flex';
            render();
        }
    }
    function openAdminModal() { document.getElementById('admin-overlay').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; resetAdminForm(); }

    function saveProduct() {
        const id = document.getElementById('edit-id').value || Date.now();
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const imgStr = document.getElementById('p-img').value;

        if(!name || !price || !imgStr) return alert("Заполните обязательные поля!");

        const pData = {
            id: id,
            name, price,
            oldPrice: document.getElementById('p-old-price').value,
            cat: document.getElementById('p-cat').value,
            desc: document.getElementById('p-desc').value,
            imgs: imgStr.split(',').map(s => s.trim())
        };

        db.ref('products/' + id).set(pData).then(() => closeAdmin());
    }

    function deleteP(id, e) {
        e.stopPropagation();
        if(confirm("Удалить товар из базы?")) db.ref('products/' + id).remove();
    }

    function editP(id, e) {
        e.stopPropagation();
        const p = products.find(x => x.id == id);
        document.getElementById('edit-id').value = p.id;
        document.getElementById('p-name').value = p.name;
        document.getElementById('p-price').value = p.price;
        document.getElementById('p-old-price').value = p.oldPrice || "";
        document.getElementById('p-cat').value = p.cat;
        document.getElementById('p-desc').value = p.desc;
        document.getElementById('p-img').value = p.imgs.join(', ');
        openAdminModal();
    }

    // РЕНДЕР
    function render() {
        const grid = document.getElementById('main-grid');
        const search = document.getElementById('smart-search').value.toLowerCase();
        
        document.getElementById('category-list').innerHTML = `<div class="nav-link ${currentCat==='Все'?'active':''}" onclick="setCat('Все', this)">Все</div>` + 
            categories.map(c => `<div class="nav-link ${currentCat===c?'active':''}" onclick="setCat('${c}', this)">${c}</div>`).join('');

        const filtered = products.filter(p => {
            const isPCComp = subCats.includes(p.cat);
            let match = false;
            if(currentCat === "Все") match = true;
            else if(currentCat === "Сборка ПК") match = currentSub === "Все" ? isPCComp : p.cat === currentSub;
            else match = (p.cat === currentCat);
            return match && (p.name.toLowerCase().includes(search) || p.desc.toLowerCase().includes(search));
        });

        grid.innerHTML = filtered.map(p => `
            <div class="product-card" onclick="openP(${p.id})">
                <div class="admin-controls" style="display:${isAdmin?'flex':'none'}">
                    <button class="admin-btn-card" onclick="editP(${p.id}, event)" style="background:#2ecc71"><i class="fas fa-edit"></i></button>
                    <button class="admin-btn-card" onclick="deleteP(${p.id}, event)" style="background:#e74c3c"><i class="fas fa-trash"></i></button>
                </div>
                ${p.oldPrice ? '<div class="promo-badge">АКЦИЯ</div>' : ''}
                <div class="p-img" style="background-image:url('${p.imgs[0]}')"></div>
                <div class="p-info">
                    <h3>${p.name}</h3>
                    <div class="price-box"><span class="price-new">${p.price} с.</span>${p.oldPrice ? `<span class="price-old">${p.oldPrice} с.</span>` : ''}</div>
                    <button class="btn-buy" style="margin-top:15px; padding:10px; font-size:0.8rem;" onclick="event.stopPropagation(); buy(${p.id})">В корзину</button>
                </div>
            </div>`).join('');
    }

    function setCat(cat, el) {
        currentCat = cat; currentSub = "Все";
        const pcSub = document.getElementById('pc-sub-nav');
        if(cat === "Сборка ПК") {
            pcSub.style.display = 'flex';
            pcSub.innerHTML = `<div class="sub-link active" onclick="setSub('Все', this)">Все запчасти</div>` + 
                subCats.map(s => `<div class="sub-link" onclick="setSub('${s}', this)">${s}</div>`).join('');
        } else { pcSub.style.display = 'none'; }
        render();
    }

    function setSub(sub, el) {
        currentSub = sub;
        document.querySelectorAll('.sub-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        render();
    }

    // ЗАКАЗ
    function openP(id) {
        const p = products.find(x => x.id == id);
        document.getElementById('m-gallery').innerHTML = p.imgs.map(s => `<img src="${s}" style="height:250px; border-radius:15px; border: 1px solid rgba(0,122,255,0.1);">`).join('');
        document.getElementById('m-title').innerText = p.name;
        document.getElementById('m-price').innerText = p.price + " смн";
        document.getElementById('m-old-price').innerText = p.oldPrice ? p.oldPrice + " смн" : "";
        document.getElementById('m-desc').innerText = p.desc || "Характеристики обновляются...";
        document.getElementById('m-buy-btn').onclick = () => { buy(p.id); document.getElementById('product-overlay').style.display='none'; };
        document.getElementById('product-overlay').style.display = 'flex';
    }

    function buy(id) { cart.push(products.find(x => x.id == id)); updateCartUI(); }
    function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }
    function openOrderForm() { if(cart.length > 0) document.getElementById('order-overlay').style.display = 'flex'; }

    async function sendOrder() {
        const name = document.getElementById('o-name').value;
        const phone = document.getElementById('o-phone').value;
        const deliv = document.getElementById('o-del').value;
        const addr = document.getElementById('o-addr').value;
        if(!name || !phone) return alert("Введите имя и контактный телефон!");

        let list = cart.map((i, idx) => `${idx+1}. ${i.name} (${i.price} смн)`).join('\n');
        let msg = `🔵 ТАДЖКОМП - НОВЫЙ ЗАКАЗ\n\n👤 Клиент: ${name}\n📞 Тел: ${phone}\n🚚 Способ: ${deliv}${deliv==='Доставка'?'\n📍 Адрес: '+addr:''}\n\n🛒 Товары:\n${list}\n\n💰 ИТОГО: ${document.getElementById('cart-total').innerText} смн`;

        try {
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({chat_id: chatId, text: msg}) });
            document.getElementById('order-overlay').style.display = 'none';
            document.getElementById('success-text').innerHTML = `Ваш заказ принят, <b>${name}</b>! Мы свяжемся с вами в течение 15 минут для подтверждения.`;
            document.getElementById('success-overlay').style.display = 'flex';
            cart = []; updateCartUI();
        } catch(e) { alert("Ошибка связи!"); }
    }

    function updateCartUI() {
        document.getElementById('cart-count').innerText = cart.length;
        let total = 0;
        document.getElementById('cart-items').innerHTML = cart.map((item, idx) => {
            total += Number(item.price);
            return `<div style="display:flex; justify-content:space-between; margin-bottom:15px; background:rgba(0,122,255,0.05); padding:15px; border-radius:15px; align-items:center;">
                <div style="font-size:0.8rem; font-weight:600; flex:1; padding-right:10px;">${item.name}</div>
                <div style="font-weight:800; color:var(--accent); white-space:nowrap;">${item.price} с.</div>
                <i class="fas fa-trash-alt" style="color:#ff4444; cursor:pointer; margin-left:15px; font-size:1rem;" onclick="cart.splice(${idx},1); updateCartUI();"></i>
            </div>`;
        }).join('');
        document.getElementById('cart-total').innerText = total;
    }

    function resetAdminForm() { document.getElementById('edit-id').value = ""; document.querySelectorAll('.admin-input').forEach(i => i.value=""); }
    function toggleTheme() { 
        const html = document.documentElement;
        const isL = html.getAttribute('data-theme') === 'light';
        html.setAttribute('data-theme', isL ? 'dark' : 'light');
        document.querySelector('.theme-toggle i').className = isL ? 'fas fa-sun' : 'fas fa-moon';
    }

    render();
</script>
</body>
</html>
